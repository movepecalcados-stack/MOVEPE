<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <script>if(localStorage.getItem('movePe_senha')&&!sessionStorage.getItem('movePe_auth'))location.replace('login.html');</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caixa — MOVE PÉ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title">💰 Caixa</div>
      <div class="topbar-info">
        <div id="caixaAcoes" style="display:flex;gap:8px">
          <button class="btn btn-primary" id="btnAbrirCaixa">🔓 Abrir Caixa</button>
          <button class="btn btn-warning" id="btnSangria" style="display:none">💸 Sangria</button>
          <button class="btn btn-success" id="btnReforco" style="display:none">💰 Reforço</button>
          <button class="btn btn-danger" id="btnFecharCaixa" style="display:none">🔒 Fechar Caixa</button>
        </div>
      </div>
    </div>

    <div class="content">
      <!-- STATUS E RESUMO -->
      <div id="caixaStatusCont">
        <div class="loading"><div class="spinner"></div> Carregando...</div>
      </div>

      <!-- HISTÓRICO -->
      <div class="section-header" style="margin-top:24px">
        <span class="section-title">📋 Histórico de Caixas</span>
      </div>
      <div id="caixaHistorico">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- MODAL ABRIR CAIXA -->
  <div class="modal-overlay" id="modalAbrirCaixa" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">🔓 Abrir Caixa</span>
        <button class="modal-close" id="btnCancelarAbertura">✕</button>
      </div>
      <div>
        <div class="form-group">
          <label class="form-label">Nome do Operador *</label>
          <input type="text" id="inputOperador" class="form-control" required placeholder="Seu nome">
        </div>
        <div class="form-group">
          <label class="form-label">Saldo Inicial (R$)</label>
          <input type="number" id="inputSaldoInicial" class="form-control" min="0" step="0.01" placeholder="0,00" value="0">
          <div class="text-muted fs-sm mt-8">Dinheiro em caixa ao abrir</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="btnCancelarAbertura2" onclick="Utils.fecharModal('modalAbrirCaixa')">Cancelar</button>
        <button class="btn btn-primary" id="btnConfirmarAbertura">🔓 Abrir Caixa</button>
      </div>
    </div>
  </div>

  <!-- MODAL SANGRIA -->
  <div class="modal-overlay" id="modalSangria" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">💸 Sangria de Caixa</span>
        <button class="modal-close" id="btnCancelarSangria">✕</button>
      </div>
      <div>
        <div class="form-group">
          <label class="form-label">Valor (R$) *</label>
          <input type="number" id="inputSangriaValor" class="form-control" min="0.01" step="0.01" placeholder="0,00">
        </div>
        <div class="form-group">
          <label class="form-label">Descrição</label>
          <input type="text" id="inputSangriaDesc" class="form-control" placeholder="Motivo da sangria">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="btnCancelarSangria2" onclick="Utils.fecharModal('modalSangria')">Cancelar</button>
        <button class="btn btn-warning" id="btnConfirmarSangria">Confirmar Sangria</button>
      </div>
    </div>
  </div>

  <!-- MODAL REFORÇO -->
  <div class="modal-overlay" id="modalReforco" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">💰 Reforço de Caixa</span>
        <button class="modal-close" id="btnCancelarReforco">✕</button>
      </div>
      <div>
        <div class="form-group">
          <label class="form-label">Valor (R$) *</label>
          <input type="number" id="inputReforcoValor" class="form-control" min="0.01" step="0.01" placeholder="0,00">
        </div>
        <div class="form-group">
          <label class="form-label">Descrição</label>
          <input type="text" id="inputReforcoDesc" class="form-control" placeholder="Origem do reforço">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="btnCancelarReforco2" onclick="Utils.fecharModal('modalReforco')">Cancelar</button>
        <button class="btn btn-success" id="btnConfirmarReforco">Confirmar Reforço</button>
      </div>
    </div>
  </div>

  <!-- MODAL FECHAMENTO DE CAIXA -->
  <div class="modal-overlay" id="modalFechamento" style="display:none">
    <div class="modal modal-lg">
      <div class="modal-header">
        <span class="modal-title">🔒 Fechamento de Caixa</span>
        <button class="modal-close" onclick="Utils.fecharModal('modalFechamento')">✕</button>
      </div>
      <div id="fechamentoResumo"></div>
      <div class="form-group" style="margin-top:16px">
        <label class="form-label">Saldo Contado em Caixa (R$) <span class="text-muted fs-sm">— opcional, para conferência</span></label>
        <input type="number" id="inputSaldoContado" class="form-control" min="0" step="0.01" placeholder="Conte o dinheiro físico e informe aqui" oninput="CaixaModule.atualizarDiferenca()">
        <div id="fechamentoDiferenca" style="margin-top:8px;padding:8px 12px;border-radius:8px;font-weight:700;display:none"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="Utils.fecharModal('modalFechamento')">Cancelar</button>
        <button class="btn btn-outline" onclick="CaixaModule.imprimirFechamentoAtual()">🖨️ Imprimir</button>
        <button class="btn btn-danger" onclick="CaixaModule.confirmarFechamento()">🔒 Fechar Caixa</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/db.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/caixa.js"></script>
</body>
</html>
