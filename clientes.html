<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <script>if(localStorage.getItem('movePe_senha')&&!sessionStorage.getItem('movePe_auth'))location.replace('login.html');</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes — MOVE PÉ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title">👥 Clientes</div>
      <div class="topbar-info">
        <button class="btn btn-primary" id="btnNovoCliente">+ Novo Cliente</button>
      </div>
    </div>

    <div class="content">
      <!-- BUSCA -->
      <div class="search-bar">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="buscaInput" class="form-control" placeholder="Buscar por nome, CPF, telefone ou email..." oninput="ClientesModule.buscar(this.value)" onkeyup="ClientesModule.buscar(this.value)">
        </div>
      </div>

      <!-- LISTA -->
      <div class="clientes-lista" id="clientesLista">
        <div class="loading"><div class="spinner"></div> Carregando...</div>
      </div>
    </div>
  </div>

  <!-- MODAL CLIENTE -->
  <div class="modal-overlay" id="modalCliente" style="display:none">
    <div class="modal modal-lg">
      <div class="modal-header">
        <span class="modal-title" id="modalClienteTitulo">Novo Cliente</span>
        <button class="modal-close" onclick="Utils.fecharModal('modalCliente')">✕</button>
      </div>
      <!-- ABAS -->
      <div style="display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px" id="clienteAbas">
        <button type="button" class="aba-btn aba-ativa" onclick="ClientesModule.trocarAba('dados')" id="abaDados" style="padding:10px 20px;background:none;border:none;border-bottom:2px solid var(--primary);color:var(--primary);font-weight:600;cursor:pointer">📋 Dados</button>
        <button type="button" class="aba-btn" onclick="ClientesModule.trocarAba('compras')" id="abaCompras" style="padding:10px 20px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text-muted);cursor:pointer" disabled>🛍️ Compras</button>
      </div>
      <form id="formCliente">
        <div class="form-row">
          <div class="form-group" style="grid-column:1/-1">
            <label class="form-label">Nome Completo *</label>
            <input type="text" id="inputNome" class="form-control" required placeholder="Nome do cliente">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">CPF</label>
            <input type="text" id="inputCpf" class="form-control" placeholder="000.000.000-00" maxlength="14">
          </div>
          <div class="form-group">
            <label class="form-label">RG</label>
            <input type="text" id="inputRg" class="form-control" placeholder="RG">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Telefone / WhatsApp</label>
            <input type="text" id="inputTelefone" class="form-control" placeholder="(00) 00000-0000" maxlength="15">
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="inputEmail" class="form-control" placeholder="email@exemplo.com">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Data de Nascimento</label>
            <input type="date" id="inputNascimento" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Profissão</label>
            <input type="text" id="inputProfissao" class="form-control" placeholder="Profissão">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Limite de Crédito (R$)</label>
          <input type="number" id="inputLimiteCredito" class="form-control" min="0" step="0.01" placeholder="0,00">
        </div>

        <hr class="divider">
        <div class="section-title mb-16">Endereço</div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">CEP</label>
            <input type="text" id="inputCep" class="form-control" placeholder="00000-000" maxlength="9">
            <span id="cepStatus" class="text-muted fs-sm" style="margin-top:4px;display:block"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Número</label>
            <input type="text" id="inputNumero" class="form-control" placeholder="Número">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Rua / Logradouro</label>
          <input type="text" id="inputRua" class="form-control" placeholder="Rua, Av., etc.">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Complemento</label>
            <input type="text" id="inputComplemento" class="form-control" placeholder="Apto, Bloco, etc.">
          </div>
          <div class="form-group">
            <label class="form-label">Bairro</label>
            <input type="text" id="inputBairro" class="form-control" placeholder="Bairro">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Cidade</label>
            <input type="text" id="inputCidade" class="form-control" placeholder="Cidade">
          </div>
          <div class="form-group">
            <label class="form-label">Estado (UF)</label>
            <input type="text" id="inputEstado" class="form-control" placeholder="SP" maxlength="2">
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-outline" id="btnCancelar">Cancelar</button>
          <button type="submit" class="btn btn-primary">💾 Salvar Cliente</button>
        </div>
      </form>

      <!-- PAINEL COMPRAS -->
      <div id="painelCompras" style="display:none">
        <div id="listaComprasCliente"></div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/db.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/clientes.js"></script>
</body>
</html>
